name: R tests

on:
  push:
  pull_request:

jobs:
  test-r-code:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up R
        uses: r-lib/actions/setup-r@v2

      - name: Install R packages
        run: |
          Rscript -e 'install.packages(c("lavaan", "testthat"), dependencies = TRUE, repos = "https://cloud.r-project.org")'

      - name: Check installed packages
        run: |
          Rscript -e 'cat("lavaan:", as.character(packageVersion("lavaan")), "\n")'
          Rscript -e 'cat("testthat:", as.character(packageVersion("testthat")), "\n")'

      - name: Run testthat tests
        run: |
          Rscript -e 'library(testthat); testthat::test_dir("tests/testthat")'
