name: R tests

on:
  push:
  pull_request:

jobs:
  test-r-code:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up R
        uses: r-lib/actions/setup-r@v2

      - name: Install pak
        run: |
          Rscript -e 'install.packages("pak", repos = "https://r-lib.github.io/p/pak/stable/")'

      - name: Install R packages
        run: |
          Rscript -e 'pak::pak(c("lavaan", "testthat"))'

      - name: Check installed packages
        run: |
          Rscript -e 'cat("lavaan:", as.character(packageVersion("lavaan")), "\n")'
          Rscript -e 'cat("testthat:", as.character(packageVersion("testthat")), "\n")'

      - name: Run testthat tests
        run: |
          Rscript -e 'library(testthat); testthat::test_dir("tests/testthat")'
